<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810"/>
      <stop offset="50%" style="stop-color:#3d2010"/>
      <stop offset="100%" style="stop-color:#1a0e08"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d060"/>
      <stop offset="40%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#a07010"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d060"/>
      <stop offset="100%" style="stop-color:#c8900a"/>
    </linearGradient>
    <linearGradient id="lapislazuli" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="50%" style="stop-color:#2060b0"/>
      <stop offset="100%" style="stop-color:#1040a0"/>
    </linearGradient>
    <linearGradient id="turquoise" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3dd6b8"/>
      <stop offset="100%" style="stop-color:#1aaa8a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer border -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- SUN DISC - clean, no eye -->
  <circle cx="256" cy="148" r="50" fill="url(#goldGrad2)" filter="url(#glow)"/>
  <circle cx="256" cy="148" r="42" fill="#c8900a"/>
  <circle cx="256" cy="148" r="34" fill="url(#goldGrad2)"/>
  <circle cx="256" cy="148" r="50" fill="none" stroke="#f5d060" stroke-width="2" opacity="0.8"/>

  <!-- Sun rays -->
  <g fill="url(#goldGrad)" opacity="0.85" filter="url(#glow)">
    <polygon points="256,82 260,95 252,95"/>
    <polygon points="256,214 260,201 252,201"/>
    <polygon points="190,148 203,144 203,152"/>
    <polygon points="322,148 309,144 309,152"/>
    <polygon points="210,102 220,113 213,118"/>
    <polygon points="302,194 292,183 299,178"/>
    <polygon points="302,102 292,113 299,118"/>
    <polygon points="210,194 220,183 213,178"/>
  </g>

  <!-- LEFT WING -->
  <path d="M 250 278
           C 236 265, 208 248, 176 232
           C 144 216, 114 196, 98 174
           C 86 157, 94 136, 114 130
           C 136 123, 162 134, 184 150
           C 204 164, 222 186, 236 212
           C 242 226, 247 254, 250 274 Z"
        fill="url(#lapislazuli)" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#softShadow)"/>

  <clipPath id="leftWingClip">
    <path d="M 250 278 C 236 265, 208 248, 176 232 C 144 216, 114 196, 98 174 C 86 157, 94 136, 114 130 C 136 123, 162 134, 184 150 C 204 164, 222 186, 236 212 C 242 226, 247 254, 250 274 Z"/>
  </clipPath>
  <g clip-path="url(#leftWingClip)" stroke="url(#goldGrad)" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M 108 169 C 138 182, 168 192, 198 200"/>
    <path d="M 106 182 C 134 193, 163 202, 192 208"/>
    <path d="M 114 158 C 142 170, 171 179, 200 186"/>
    <path d="M 126 146 C 153 158, 180 168, 206 175"/>
    <path d="M 144 137 C 169 149, 194 158, 218 165"/>
  </g>

  <!-- RIGHT WING -->
  <path d="M 262 278
           C 276 265, 304 248, 336 232
           C 368 216, 398 196, 414 174
           C 426 157, 418 136, 398 130
           C 376 123, 350 134, 328 150
           C 308 164, 290 186, 276 212
           C 270 226, 265 254, 262 274 Z"
        fill="url(#lapislazuli)" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#softShadow)"/>

  <clipPath id="rightWingClip">
    <path d="M 262 278 C 276 265, 304 248, 336 232 C 368 216, 398 196, 414 174 C 426 157, 418 136, 398 130 C 376 123, 350 134, 328 150 C 308 164, 290 186, 276 212 C 270 226, 265 254, 262 274 Z"/>
  </clipPath>
  <g clip-path="url(#rightWingClip)" stroke="url(#goldGrad)" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M 404 169 C 374 182, 344 192, 314 200"/>
    <path d="M 406 182 C 378 193, 349 202, 320 208"/>
    <path d="M 398 158 C 370 170, 341 179, 312 186"/>
    <path d="M 386 146 C 359 158, 332 168, 306 175"/>
    <path d="M 368 137 C 343 149, 318 158, 294 165"/>
  </g>

  <!-- BEETLE BODY -->
  <ellipse cx="256" cy="322" rx="52" ry="72" fill="url(#turquoise)" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#softShadow)"/>

  <!-- Pronotum -->
  <path d="M 210 282 Q 256 272 302 282 Q 302 298 256 301 Q 210 298 210 282 Z"
        fill="#1aaa8a" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <!-- Center line -->
  <line x1="256" y1="301" x2="256" y2="390" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>

  <!-- Elytra lines -->
  <path d="M 213 318 Q 256 314 299 318" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.65"/>
  <path d="M 209 340 Q 256 336 303 340" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.65"/>
  <path d="M 210 362 Q 256 358 302 362" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6"/>

  <!-- HEAD -->
  <path d="M 224 276 Q 256 263 288 276 Q 288 289 256 292 Q 224 289 224 276 Z"
        fill="#1aaa8a" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Clypeus -->
  <path d="M 236 277 L 232 271 M 246 274 L 244 268 M 256 273 L 256 266 M 266 274 L 268 268 M 276 277 L 280 271"
        stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- LEGS -->
  <g stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M 210 300 C 190 294, 172 286, 156 274"/>
    <path d="M 207 326 C 185 322, 164 317, 145 308"/>
    <path d="M 209 352 C 188 357, 167 362, 149 372"/>
    <path d="M 302 300 C 322 294, 340 286, 356 274"/>
    <path d="M 305 326 C 327 322, 348 317, 367 308"/>
    <path d="M 303 352 C 324 357, 345 362, 363 372"/>
  </g>
  <g fill="url(#goldGrad)" opacity="0.7">
    <circle cx="155" cy="273" r="3"/>
    <circle cx="144" cy="307" r="3"/>
    <circle cx="148" cy="373" r="3"/>
    <circle cx="357" cy="273" r="3"/>
    <circle cx="368" cy="307" r="3"/>
    <circle cx="364" cy="373" r="3"/>
  </g>

  <!-- Antennae -->
  <path d="M 242 266 C 232 251, 224 237, 214 222" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="213" cy="220" r="5" fill="url(#goldGrad)" filter="url(#glow)"/>
  <path d="M 270 266 C 280 251, 288 237, 298 222" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="299" cy="220" r="5" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- Bottom hieroglyph band - simplified -->
  <rect x="120" y="418" width="272" height="2" fill="url(#goldGrad)" opacity="0.6"/>

  <g fill="url(#goldGrad)" opacity="0.6">
    <!-- Ankh -->
    <ellipse cx="160" cy="432" rx="7" ry="6" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <line x1="160" y1="438" x2="160" y2="452" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <line x1="153" y1="444" x2="167" y2="444" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- Scarab small -->
    <ellipse cx="220" cy="435" rx="10" ry="8" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <line x1="220" y1="427" x2="220" y2="443" stroke="url(#goldGrad)" stroke-width="1"/>
    <!-- Sun disc small -->
    <circle cx="256" cy="435" rx="9" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <circle cx="256" cy="435" r="3" fill="url(#goldGrad)"/>
    <!-- Scarab mirror -->
    <ellipse cx="292" cy="435" rx="10" ry="8" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <line x1="292" y1="427" x2="292" y2="443" stroke="url(#goldGrad)" stroke-width="1"/>
    <!-- Ankh mirror -->
    <ellipse cx="352" cy="432" rx="7" ry="6" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <line x1="352" y1="438" x2="352" y2="452" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <line x1="345" y1="444" x2="359" y2="444" stroke="url(#goldGrad)" stroke-width="1.5"/>
  </g>

  <rect x="120" y="455" width="272" height="2" fill="url(#goldGrad)" opacity="0.6"/>
</svg>